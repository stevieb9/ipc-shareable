name: CI
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        perl: [ '5.40', '5.34', '5.32', '5.24', '5.20', '5.18', '5.14', '5.12' ]
        include:
          - perl: '5.32'
            os: ubuntu-latest
            coverage: true
    name: Perl ${{ matrix.perl }} on ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v2
      - name: Set up perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}
      - run: perl -V
      - run: cpanm ExtUtils::PL2Bat
      - run: cpanm ExtUtils::MakeMaker
      - run: cpanm --installdeps .
      - name: Run tests (no coverage)
        env:
          CI_TESTING: 1
        if: ${{ !matrix.coverage }}
        run: prove -lv t
      - name: Run tests (with coverage)
        if: ${{ matrix.coverage }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_TESTING: 1
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          cpanm -n Devel::Cover::Report::Coveralls
          cover -test -report Coveralls

  build-i386:
    runs-on: ubuntu-latest
    name: Perl (system) on ubuntu i386
    steps:
      - uses: actions/checkout@v2
      - name: Set up QEMU for i386
        uses: docker/setup-qemu-action@v3
        with:
          platforms: i386
      - name: Run tests inside i386 container
        uses: addnab/docker-run-action@v3
        with:
          image: debian:bookworm
          options: --platform linux/386 -v ${{ github.workspace }}:/workspace
          run: |
            apt-get update -q
            apt-get install -y -q perl cpanminus make gcc
            cd /workspace
            cpanm ExtUtils::MakeMaker
            cpanm --installdeps .
            CI_TESTING=1 prove -lv t

  build-freebsd:
    runs-on: ubuntu-latest
    name: Perl (system) on FreeBSD 14.1 aarch64
    steps:
      - uses: actions/checkout@v4
      - name: Run tests on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.1"
          arch: aarch64
          usesh: true
          prepare: |
            pkg install -y perl5 p5-App-cpanminus gmake
          run: |
            cpanm ExtUtils::MakeMaker
            cpanm --installdeps .
            perl Makefile.PL
            make
            CI_TESTING=1 prove -lv t
