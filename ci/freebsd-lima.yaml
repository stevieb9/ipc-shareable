# Lima VM config for FreeBSD 14.3 aarch64.
#
# Matches the CPAN smoker platform that reported struct-unpack failures.
# Used on macOS Apple Silicon (HVF native) and on any aarch64 Linux host.
# For x86_64 Linux, see freebsd-lima-x86_64.yaml — `freebsd-test.sh` picks
# the right file based on `uname -m`.
#
# (Why two files: Lima 2.1.1 does not auto-select an image entry by host
# arch when the top-level `arch:` field is absent. Splitting into two
# single-arch YAMLs is simpler than templating.)
#
# Setup is done automatically by freebsd-test.sh.

vmType: qemu
os: FreeBSD
arch: aarch64

user:
  name: freebsd

images:
  - location: "https://download.freebsd.org/releases/VM-IMAGES/14.3-RELEASE/aarch64/Latest/FreeBSD-14.3-RELEASE-arm64-aarch64-BASIC-CLOUDINIT-ufs.qcow2.xz"
    arch: aarch64

cpus: 2
memory: "2GiB"
disk: "20GiB"

mounts: []
