# Lima VM config for FreeBSD 14.3
#
# Multi-arch: Lima picks the image whose arch matches the host.
#   macOS Apple Silicon → aarch64 (HVF native)
#   Linux x86_64        → x86_64  (KVM native)
#
# aarch64 was originally pinned to match a CPAN smoker that reported
# struct-unpack failures (see git history); x86_64 is the typical platform
# for the rest of CPAN.
#
# Setup (one-time):
#   limactl create --name freebsd-ipc ci/freebsd-lima.yaml
#   limactl start freebsd-ipc
#
# Run tests:
#   ./ci/freebsd-test.sh
#
# Interactive shell:
#   limactl shell freebsd-ipc
#
# Stop / delete:
#   limactl stop freebsd-ipc
#   limactl delete freebsd-ipc

vmType: qemu
os: FreeBSD

user:
  name: freebsd

images:
  - location: "https://download.freebsd.org/releases/VM-IMAGES/14.3-RELEASE/aarch64/Latest/FreeBSD-14.3-RELEASE-arm64-aarch64-BASIC-CLOUDINIT-ufs.qcow2.xz"
    arch: aarch64
  - location: "https://download.freebsd.org/releases/VM-IMAGES/14.3-RELEASE/amd64/Latest/FreeBSD-14.3-RELEASE-amd64-BASIC-CLOUDINIT-ufs.qcow2.xz"
    arch: x86_64

cpus: 2
memory: "2GiB"
disk: "20GiB"

mounts: []
